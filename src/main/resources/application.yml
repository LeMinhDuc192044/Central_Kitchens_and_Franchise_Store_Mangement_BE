spring:
    application:
        name: Central_Kitchens_and_Franchise_Store_BE

    datasource:
       url: ${DATABASE_URL}
       username: ${DATABASE_USERNAME}
       password: ${DATABASE_PASSWORD}
       driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000        # 24 hours (1 day)
    refresh-expiration: 604800000  # 7 days

  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true


ghn:
 base-url: https://dev-online-gateway.ghn.vn
 token: ${API_TOKEN}
 shop-id: ${SHOP_ID}
 central-kitchen-district-id: 1528      # Thành phố Thủ Đức
 central-kitchen-ward-code: "40304"     # Phường Thủ Đức
 default-service-type-id: 2

springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui.html
        enabled: true

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
  return-url: http://localhost:8080/api/payment/vnpay-return
  ipn-url: http://localhost:8080/api/payment/vnpay-ipn
  version: "2.1.0"
  command: pay
  locale: vn
  currency-code: VND
  refund-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction






